<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - PromotionsCW</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .dashboard {
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
        }

        .welcome-card {
            background: rgba(255,255,255,.12);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-card h1 {
            margin-bottom: 10px;
        }

        .welcome-card p {
            opacity: .9;
        }

        .menu-grid {
            display: grid;
            gap: 15px;
        }

        .menu-btn {

            display: block;

            text-decoration: none;

            padding: 18px;

            border-radius: 12px;

            text-align: center;

            font-weight: bold;

            font-size: 18px;

            background: white;

            color: #0057b8;

            transition: .2s;
        }

        .menu-btn:hover {
            transform: scale(1.02);
        }

        .plan-card {

            margin-top: 20px;

            padding: 20px;

            border-radius: 15px;

            background: rgba(255,255,255,.12);

            text-align: center;
        }

        .plan-badge {

            display: inline-block;

            margin-top: 10px;

            padding: 8px 14px;

            border-radius: 20px;

            background: #003f87;

            color: white;

            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="dashboard">

    <div class="welcome-card">

        <h1>Welcome</h1>

        <p>
            Manage your promotions from one place.
        </p>

    </div>

    <div class="menu-grid">

        <a href="promo.html" class="menu-btn">
            ➕ Create Promotion
        </a>

        <a href="calendar.html" class="menu-btn">
            📅 Promotion Calendar
        </a>

        <a href="#" class="menu-btn">
            🖼 My Promotions
        </a>

        <a href="#" class="menu-btn">
            ⚙ Account Settings
        </a>

    </div>

    <div class="plan-card">

        <h3>Current Plan</h3>

        <div class="plan-badge">
            BETA ACCESS
        </div>

    </div>

</div>

</body>

</html>

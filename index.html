<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Landing Page Creator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Tooltip style for the hover/tap helpers */
        .helper-text {
            display: none;
        }
        .helper-container:hover .helper-text, 
        .helper-container:focus-within .helper-text {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <div id="creator-screen" class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-6 my-4 border-4 border-blue-500">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-2">🚀 Go Live in 2 Minutes</h1>
        <p class="text-center text-gray-500 mb-6 font-medium">No tech skills needed. Just fill and snap!</p>

        <form id="landing-form" class="space-y-6">
            
            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">1. Choose Your Style</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="border-4 border-blue-500 rounded-2xl p-4 text-center cursor-pointer block bg-blue-5 text-blue-900 font-bold text-lg relative">
                        <input type="radio" name="tier" value="basic" checked class="absolute top-3 right-3 scale-150">
                        ⭐ Basic<br><span class="text-xs font-normal text-gray-500">1 Photo • Simple</span>
                    </label>
                    <label class="border-2 border-gray-300 rounded-2xl p-4 text-center cursor-pointer block font-bold text-lg text-gray-700 relative hover:border-yellow-500">
                        <input type="radio" name="tier" value="gold" class="absolute top-3 right-3 scale-150">
                        👑 Gold<br><span class="text-xs font-normal text-gray-500">2 Photos • Stand Out</span>
                    </label>
                </div>
            </div>

            <div class="helper-container">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xl font-bold text-gray-700">2. The Catch (Your Main Photo)</label>
                    <button type="button" class="bg-gray-200 text-gray-700 font-bold px-3 py-1 rounded-full text-sm">?</button>
                </div>
                <p class="helper-text bg-blue-50 text-blue-800 p-3 rounded-xl mb-2 text-sm font-medium">
                    💡 Tip: Take a picture of your best product, your menu, or the front of your shop!
                </p>
                <label class="flex flex-col items-center justify-center w-full h-40 border-4 border-dashed border-gray-300 rounded-2xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <span class="text-4xl mb-2">📸</span>
                        <p class="text-lg font-bold text-gray-600">Tap to Take or Choose Photo</p>
                        <p id="upload-status" class="text-xs text-gray-400 mt-1">Accepts any smartphone picture</p>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" class="hidden" />
                </label>
            </div>

            <div class="helper-container">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xl font-bold text-gray-700">3. What is the Deal?</label>
                    <button type="button" class="bg-gray-200 text-gray-700 font-bold px-3 py-1 rounded-full text-sm">?</button>
                </div>
                <p class="helper-text bg-blue-50 text-blue-800 p-3 rounded-xl mb-2 text-sm font-medium">
                    💡 Tip: Write something short! Example: "Show this page to get 10% off your next coffee!"
                </p>
                <textarea id="promo-text" rows="3" placeholder="Type your special offer or announcement here..." class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800"></textarea>
            </div>

            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">4. How do customers reach you?</label>
                <input type="text" id="contact-info" placeholder="Phone number, WhatsApp, or address" class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800">
            </div>

            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">5. When does this offer end?</label>
                <input type="date" id="expiry-date" class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800">
            </div>

            <button type="button" id="generate-btn" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-5 px-4 rounded-2xl shadow-lg transform active:scale-95 transition tracking-wide cursor-pointer">
                🚀 MAKE ME LIVE INSTANTLY
            </button>
        </form>
    </div>

    <div id="preview-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden my-4 border-4 border-green-500">
        <div class="bg-green-500 text-white text-center py-2 font-black tracking-widest text-sm">
            ✨ YOUR LIVE PAGE PREVIEW ✨
        </div>
        
        <div class="p-0">
            <img id="preview-img" src="" alt="Promo Photo" class="w-full h-64 object-cover hidden">
            <div class="p-6 space-y-4">
                <p id="preview-text" class="text-2xl font-extrabold text-gray-900 break-words"></p>
                
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">How to claim:</p>
                    <p id="preview-contact" class="text-lg font-bold text-blue-600 break-words"></p>
                </div>

                <div class="flex justify-between items-center text-sm font-bold bg-red-50 text-red-600 px-4 py-2 rounded-xl">
                    <span>⏳ Valid Until:</span>
                    <span id="preview-date"></span>
                </div>
            </div>
        </div>

        <div class="p-6 bg-gray-50 border-t border-gray-200 space-y-3">
            <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-center block text-lg">
                🖨️ Print Page / QR Code
            </button>
            <button onclick="editForm()" class="w-full bg-gray-300 text-gray-700 font-bold py-2 rounded-xl text-center block">
                ✏️ Edit Something
            </button>
        </div>
    </div>

    <script>
        let compressedImageDataUrl = "";

        // BROWSER-SIDE IMAGE COMPRESSION LOGIC
        document.getElementById('photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-status').innerText = "🔄 Processing photo layout...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    // Create an invisible canvas element
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Set target dimension constraint (e.g., max 800px width/height)
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    
                    // Draw image onto canvas (resizes it)
                    ctx.drawImage(img, 0, 0, width, height);

                    // Export to compressed JPEG format (0.7 quality factor)
                    // This shrinks a 5MB phone picture down to roughly 100KB-200KB instantly!
                    compressedImageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('upload-status').innerText = "✅ Photo ready & optimized!";
                    document.getElementById('upload-status').classList.add('text-green-600', 'font-bold');
                }
            }
        });

        // GENERATE & REVEAL PREVIEW
        document.getElementById('generate-btn').addEventListener('click', function() {
            // Grab inputs
            const promoText = document.getElementById('promo-text').value || "No special description provided.";
            const contactInfo = document.getElementById('contact-info').value || "Contact business directly.";
            const expiryDate = document.getElementById('expiry-date').value || "While stocks last";

            // Inject into preview templates
            document.getElementById('preview-text').innerText = promoText;
            document.getElementById('preview-contact').innerText = contactInfo;
            document.getElementById('preview-date').innerText = expiryDate;

            if(compressedImageDataUrl) {
                const pImg = document.getElementById('preview-img');
                pImg.src = compressedImageDataUrl;
                pImg.classList.remove('hidden');
            }

            // Smooth UI shift
            document.getElementById('creator-screen').classList.add('hidden');
            const preview = document.getElementById('preview-screen');
            preview.classList.remove('hidden');
            preview.scrollIntoView({ behavior: 'smooth' });
        });

        // TOGGLE BACK TO EDITING
        function editForm() {
            document.getElementById('preview-screen').classList.add('hidden');
            document.getElementById('creator-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PromotionsCW</title>

  <link rel="stylesheet" href="css/style.css">

  <style>

    .login-container{
      max-width:600px;
      margin:40px auto;
      padding:20px;
    }

    .login-card{
      background:rgba(255,255,255,.12);
      padding:25px;
      border-radius:15px;
    }

    .login-card h1{
      text-align:center;
      margin-bottom:20px;
    }

    label{
      display:block;
      margin:15px 0 6px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
    }

    .login-btn{
      width:100%;
      margin-top:25px;
      padding:15px;

      border:none;
      border-radius:12px;

      background:white;
      color:#0057b8;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;
    }

    .links{
      text-align:center;
      margin-top:20px;
    }

    .links a{
      color:white;
      text-decoration:none;
      margin:0 10px;
    }

  </style>

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h1>Business Login</h1>

    <form>

      <label>Email Address</label>
      <input type="email" required>

      <label>Password</label>
      <input type="password" required>

      <button class="login-btn">
        Login
      </button>

    </form>

  </div>

  <div class="links">

    <a href="register.html">
      Create Account
    </a>

    |

    <a href="index.html">
      Home
    </a>

  </div>

</div>

</body>
</html>

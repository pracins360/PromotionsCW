<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Promotions - PromotionsCW</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .container{
            max-width:900px;
            margin:20px auto;
            padding:20px;
        }

        .page-title{
            text-align:center;
            margin-bottom:20px;
        }

        .promo-card{

            background:rgba(255,255,255,.12);

            border-radius:15px;

            padding:15px;

            margin-bottom:15px;
        }

        .promo-image{
            width:100%;
            max-height:200px;
            object-fit:cover;
            border-radius:10px;
            margin-bottom:10px;
        }

        .promo-title{
            font-size:20px;
            font-weight:bold;
            margin-bottom:8px;
        }

        .promo-description{
            margin-bottom:10px;
        }

        .promo-dates{
            opacity:.9;
            margin-bottom:15px;
        }

        .actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn-action{
            flex:1;
            min-width:120px;

            text-align:center;
            text-decoration:none;

            padding:12px;

            border-radius:10px;

            font-weight:bold;
        }

        .edit-btn{
            background:#ffffff;
            color:#0057b8;
        }

        .delete-btn{
            background:#c62828;
            color:white;
        }

        .new-btn{

            display:block;

            text-align:center;

            margin-bottom:20px;

            padding:15px;

            border-radius:12px;

            text-decoration:none;

            font-weight:bold;

            background:white;

            color:#0057b8;
        }

        .dashboard-link{

            display:block;

            text-align:center;

            margin-top:20px;

            color:white;

            text-decoration:none;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 class="page-title">
        My Promotions
    </h1>

    <a href="promo.html" class="new-btn">
        ➕ Create New Promotion
    </a>

    <!-- SAMPLE PROMOTION -->

    <div class="promo-card">

        <img
            src="assets/banners/current-banner.jpg"
            alt="Promotion Image"
            class="promo-image"
        >

        <div class="promo-title">
            Flag Day Special
        </div>

        <div class="promo-description">
            Buy one and get one free.
        </div>

        <div class="promo-dates">
            Active: Jul 2 - Jul 5
        </div>

        <div class="actions">

            <a href="#" class="btn-action edit-btn">
                ✏ Edit
            </a>

            <a href="#" class="btn-action delete-btn">
                🗑 Delete
            </a>

        </div>

    </div>

    <a href="dashboard.html" class="dashboard-link">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>

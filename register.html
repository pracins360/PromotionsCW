<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Business - PromotionsCW</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .register-container{
            max-width:600px;
            margin:20px auto;
            padding:20px;
        }

        .card{
            background:rgba(255,255,255,0.12);
            backdrop-filter: blur(5px);
            border-radius:15px;
            padding:25px;
        }

        .card h1{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        .plan-group{
            display:flex;
            gap:10px;
            margin-top:10px;
        }

        .plan-btn{
            flex:1;
            padding:14px;
            border-radius:10px;
            border:2px solid white;
            background:transparent;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .plan-btn:hover{
            background:rgba(255,255,255,.15);
        }

        .register-btn{
            width:100%;
            margin-top:25px;
            padding:16px;
            border:none;
            border-radius:12px;
            background:#ffffff;
            color:#0057b8;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .back-link{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="register-container">

    <div class="card">

        <h1>Register Your Business</h1>

        <form id="registerForm">

            <label>Business Name</label>
            <input type="text" id="businessName" required>

            <label>Contact Person</label>
            <input type="text" id="contactPerson" required>

            <label>WhatsApp Number</label>
            <input type="tel" id="whatsapp" placeholder="599..." required>

            <label>Email Address</label>
            <input type="email" id="email" required>

            <label>Category</label>

            <select id="category">
                <option>Restaurant</option>
                <option>Retail Store</option>
                <option>Beauty & Wellness</option>
                <option>Automotive</option>
                <option>Tourism</option>
                <option>Professional Services</option>
                <option>Other</option>
            </select>

            <label>Choose Plan</label>

            <div class="plan-group">

                <button type="button"
                        class="plan-btn"
                        onclick="selectPlan('collective')">
                    Collective
                </button>

                <button type="button"
                        class="plan-btn"
                        onclick="selectPlan('solo')">
                    Solo
                </button>

            </div>

            <input type="hidden" id="selectedPlan" value="collective">

            <label>Password</label>
            <input type="password" id="password" required>

            <button class="register-btn" type="submit">
                Create Account
            </button>

        </form>

    </div>
